<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Indus International School</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8fafc;
            background-image: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            box-sizing: border-box;
        }

        .login-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 2.5rem 2.5rem;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border: 1px solid #f1f5f9;
        }

        .logo-area {
            margin-bottom: 1.5rem;
        }

        .crest-icon {
            color: #2563eb;
            font-size: 2.4rem;
            margin-bottom: 0.25rem;
        }

        .motto {
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .school-name-main {
            font-size: 2.2rem;
            letter-spacing: 2px;
            color: #0f172a;
            font-weight: 800;
            margin: 0;
            line-height: 1.2;
        }

        .school-name-sub {
            font-size: 0.85rem;
            letter-spacing: 1px;
            color: #475569;
        }

        .login-pill {
            display: inline-block;
            background-color: #eff6ff;
            color: #1d4ed8;
            padding: 6px 28px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            letter-spacing: 0.5px;
            border: 1px solid #bfdbfe;
        }

        .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            color: #334155;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-input {
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 12px 14px;
            width: 100%;
            box-sizing: border-box;
            color: #0f172a;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            cursor: pointer;
            font-size: 1.1rem;
            transition: color 0.2s;
        }
        
        .toggle-password:hover {
            color: #475569;
        }

        .btn-submit {
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 14px;
            width: 100%;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 0.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .btn-submit:hover {
            background-color: #1d4ed8;
        }
        
        .btn-submit:active {
            transform: translateY(1px);
        }

        .register-text {
            font-size: 0.85rem;
            color: #64748b;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .forgot-password {
            margin-top: 1rem;
        }

        .forgot-password a {
            color: #3b82f6;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .forgot-password a:hover {
            text-decoration: underline;
            color: #2563eb;
        }

        .alert {
            padding: 12px;
            margin-bottom: 1.5rem;
            border-radius: 6px;
            font-size: 0.9rem;
            text-align: left;
        }
        .alert-error {
            background-color: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        .alert-success {
            background-color: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            
            <div class="logo-area">
                <i class="fas fa-building crest-icon"></i>
                <div class="motto">BUSINESS PORTAL</div>
                <div class="school-name-main">Dashboard</div>
                <div class="school-name-sub">Enterprise Management</div>
            </div>

            <div class="login-pill">Login</div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="email" class="form-label">Email:</label>
                    <input type="email" id="email" name="email" class="form-input" required>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password:</label>
                    <div class="password-container">
                        <input type="password" id="password" name="password" class="form-input" style="padding-right: 40px;" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit">Login</button>
                
                <div class="register-text">
                    IF NOT REGISTERED . CONTACT TEAM
                </div>
                
                <div class="forgot-password">
                    <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.querySelector('.toggle-password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
