<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Business Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2>Reset Password</h2>
            <p style="text-align: center; margin-bottom: 1.5rem; color: #64748b;">Enter your email to receive a password reset link.</p>
            <form method="POST" action="{{ url_for('forgot_password') }}">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="user@company.com" required>
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top: 0.5rem;">Send Reset Link</button>
                <div class="create-account">
                    Remember your password? <a href="{{ url_for('login') }}">Back to Login</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
